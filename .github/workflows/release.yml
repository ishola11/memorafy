name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal macOS build (Apple Silicon + Intel) → single notarization.
          # Two separate arch jobs doubled notarization wait time and caused flaky
          # network failures while polling appstoreconnect.apple.com for hours.
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}
    # macOS: build (~15 min) + notarization poll (often 15–45 min, sometimes longer)
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Preflight release secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          fail() { echo "::error title=Release preflight failed::$1"; exit 1; }

          echo "=== Memorafy release preflight (${{ matrix.platform }}) ==="

          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            fail "TAURI_SIGNING_PRIVATE_KEY is empty. Paste the full contents of apps/desktop/src-tauri/keys/memorafy.key into GitHub repository secrets."
          fi

          key_bytes=$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | wc -c | tr -d ' ')
          if [[ "$key_bytes" -lt 100 ]]; then
            fail "TAURI_SIGNING_PRIVATE_KEY looks truncated (${key_bytes} bytes). Copy the entire memorafy.key file again."
          fi

          if ! printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d >/dev/null 2>&1; then
            fail "TAURI_SIGNING_PRIVATE_KEY is not valid base64. Paste the single-line contents of memorafy.key exactly."
          fi

          [[ -n "${SUPABASE_URL:-}" ]] || fail "SUPABASE_URL is not set."
          [[ -n "${SUPABASE_ANON_KEY:-}" ]] || fail "SUPABASE_ANON_KEY is not set."

          if [[ ! "$SUPABASE_URL" == https://* ]]; then
            fail "SUPABASE_URL must start with https://"
          fi

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            [[ -n "${APPLE_CERTIFICATE:-}" ]] || fail "APPLE_CERTIFICATE is not set (base64 .p12 export)."
            [[ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]] || fail "APPLE_CERTIFICATE_PASSWORD is not set."
            [[ -n "${APPLE_SIGNING_IDENTITY:-}" ]] || fail "APPLE_SIGNING_IDENTITY is not set (e.g. Developer ID Application: Name (TEAMID))."
            [[ -n "${APPLE_TEAM_ID:-}" ]] || fail "APPLE_TEAM_ID is not set."

            [[ -n "${APPLE_API_ISSUER:-}" ]] || fail "APPLE_API_ISSUER is not set (App Store Connect issuer)."
            [[ -n "${APPLE_API_KEY_ID:-}" ]] || fail "APPLE_API_KEY_ID is not set (App Store Connect Key ID)."
            [[ -n "${APPLE_API_KEY_P8:-}" ]] || fail "APPLE_API_KEY_P8 is not set (contents of the .p8 file)."
          fi

          echo "TAURI_SIGNING_PRIVATE_KEY size: ${key_bytes} bytes"
          echo "SUPABASE_URL host: $(echo "$SUPABASE_URL" | sed -E 's|https://([^/]+).*|\1|')"
          echo "Preflight passed — safe to build."

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install npm dependencies
        run: npm ci

      - name: Sync updater pubkey
        run: node scripts/sync-updater-pubkey.mjs

      - name: Prepare App Store Connect API key (notarytool)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s\n' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # macOS Developer ID signing (codesign + hardened runtime)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarization via App Store Connect API key
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Tauri expects APPLE_API_KEY to be the "Key ID"
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: Memorafy v__VERSION__
          releaseBody: |
            See the assets to download this version and install.

            The app will check this release for updates automatically.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
